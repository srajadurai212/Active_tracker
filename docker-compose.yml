version: "3.9"

services:


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://raja:Muthulingam@12345@raja.postgres.database.azure.com:5432/activetrackerdb?ssl=require
      SECRET_KEY: change-me-in-production-use-long-random-string
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme123
      ADMIN_NAME: Admin User
      CORS_ORIGINS: https://activity-tracker-dev.izserver24.in
    ports:
      - "7200:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: https://activity-tracker-api-dev.izserver24.in/api/v1
    ports:
      - "7100:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
